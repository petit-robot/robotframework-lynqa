name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Tests – ${{ matrix.package }} (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
        package: [pylynqa]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install ${{ matrix.package }} with dev dependencies
        run: pip install -e "projects/${{ matrix.package }}[dev]"

      - name: Run tests – ${{ matrix.package }}
        run: pytest projects/${{ matrix.package }} -v --tb=short