name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality:
    name: Code quality – pylynqa (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install pylynqa with dev dependencies
        run: pip install -e "projects/pylynqa[dev]"

      - name: ruff check
        run: ruff check --config cfg/python/ruff.toml projects/pylynqa

      - name: ruff format
        run: ruff format --config cfg/python/ruff.toml --check projects/pylynqa

      - name: ty
        run: ty check --config-file cfg/python/ty.toml --project projects/pylynqa --output-format github

  test:
    name: Tests – ${{ matrix.package }} (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
        package: [pylynqa]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install ${{ matrix.package }} with dev dependencies
        run: pip install -e "projects/${{ matrix.package }}[dev]"

      - name: Run tests – ${{ matrix.package }}
        run: pytest projects/${{ matrix.package }} -v --tb=short