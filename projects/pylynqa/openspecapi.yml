          example: Insufficient credits
        start:
          format: date-time
          type: string
          description: Start date
          example: '2025-09-18T09:00:00.000Z'
        end:
          format: date-time
          type: string
          description: End date
          example: '2025-09-18T09:05:27.000Z'
        expiration:
          format: date-time
          type: string
          description: Expiration date
          example: '2025-09-18T09:05:27.000Z'
        stepStatuses:
          description: >-
            Per-step execution reports combining the commands executed and the
            resulting outcome for each step. Depending on the step status, only
            relevant fields are present (e.g., status, timestamps, assertions
            report, verdict cause, or error).
          type: array
          items:
            $ref: '#/components/schemas/StepReport'
        type:
          type: string
          enum:
